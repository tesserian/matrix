<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Rain — Horizontal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<script>
  const CONFIG = {
    tailMean:    40,
    tailSpread:  12,
    tailPow:     0.6,
    speedMean:   18,
    speedSpread: 6,
    density:     0.99,
    flySpeed:    90,
    focal:       300,
    zFar:        1200,
    zNear:       60,
    baseFont:    14,
    charAspect:  0.55,

    deathRate:     0.20,
    deathFadeMs:   1200,

    bpm:           120,
    pulseDuration: 120,
    pulseWidth:    150,
    pulseStrength: 1.0,
    glowDecayMs:   400,
  };

  const canvas = document.getElementById('matrix');
  const ctx    = canvas.getContext('2d');

  const CODE_STRINGS = [
    'classEventEmitter{constructor(){this._map=newMap();}on(event,fn){if(!this._map.has(event))this._map.set(event,[]);this._map.get(event).push(fn);returnthis;}emit(event,...args){(this._map.get(event)||[]).forEach(f=>f(...args));returnthis;}off(event,fn){consthandlers=this._map.get(event);if(handlers)this._map.set(event,handlers.filter(h=>h!==fn));returnthis;}}',
    'constfetchWithRetry=async(url,retries=3)=>{for(leti=0;i<retries;i++){try{constres=awaitfetch(url,{signal:AbortSignal.timeout(5000)});if(res.ok)returnawaitres.json();if(res.status<500)break;}catch(e){if(i===retries-1)throwe;awaitnewPromise(r=>setTimeout(r,200*(2**i)));}};returnnull;};',
    'classObservable{constructor(sub){this._sub=sub;}subscribe(obs){constw={next:obs.next?.bind(obs)||noop,error:obs.error?.bind(obs)||noop,complete:obs.complete?.bind(obs)||noop};returnthis._sub(w);}pipe(...ops){returnops.reduce((o,f)=>f(o),this);}staticof(...vals){returnnewObservable(obs=>{vals.forEach(v=>obs.next(v));obs.complete();});}staticfrom(iter){returnnewObservable(obs=>{for(constxofiter)obs.next(x);obs.complete();});}}',
    'funcNewPool[Tin,Tout any](ctx context.Context,workers int,fn func(T)Tout)*Pool[Tin,Tout]{p:=&Pool[Tin,Tout]{in:make(chan Tin,workers*2),out:make(chan Tout,workers*2)};for i:=0;i<workers;i++{go func(){for v:=range p.in{select{case<-ctx.Done():return;case p.out<-fn(v):}}}()};return p}',
    'func Chain(h http.Handler,mw ...func(http.Handler)http.Handler)http.Handler{for i:=len(mw)-1;i>=0;i--{h=mw[i](h)};return h}func Logging(next http.Handler)http.Handler{return http.HandlerFunc(func(w http.ResponseWriter,r *http.Request){t:=time.Now();wrap:=&statusRecorder{ResponseWriter:w,code:200};next.ServeHTTP(wrap,r);slog.Info(r.Method,r.URL.Path,wrap.code,time.Since(t))})}',
    'pub fn load_config(path:&Path)->Result<AppConfig,ConfigError>{let raw=fs::read_to_string(path).map_err(ConfigError::Io)?;let partial:PartialConfig=toml::from_str(&raw).map_err(ConfigError::Parse)?;let merged=partial.merge(PartialConfig::from_env());merged.validate().map_err(ConfigError::Validation)?;Ok(AppConfig::from(merged))}',
    'async fn run_bus(mut rx:Receiver<Msg>,clients:Arc<RwLock<Vec<Sender<Msg>>>>){while let Ok(msg)=rx.recv().await{let guard=clients.read().await;let futures:Vec<_>=guard.iter().map(|tx|{let m=msg.clone();async move{let _=tx.send(m).await;}}).collect();futures::future::join_all(futures).await;}}',
    'template<typename T,std::size_t N>class RingBuffer{static_assert((N&(N-1))==0,"N must be power of two");public:bool push(T&&v){const auto h=head_.load(std::memory_order_relaxed);const auto t=tail_.load(std::memory_order_acquire);if((h-t)==N)return false;buf_[h&(N-1)]=std::move(v);head_.store(h+1,std::memory_order_release);return true;}std::optional<T>pop(){const auto t=tail_.load(std::memory_order_relaxed);const auto h=head_.load(std::memory_order_acquire);if(h==t)return std::nullopt;T v=std::move(buf_[t&(N-1)]);tail_.store(t+1,std::memory_order_release);return v;}private:std::array<T,N>buf_{};std::atomic<std::size_t>head_{0},tail_{0};};',
    'template<typename D,template<typename>class Policy=DefaultPolicy>struct Base:public Policy<D>{using base_t=Base;void execute(){static_cast<D*>(this)->before();Policy<D>::run(static_cast<D*>(this));static_cast<D*>(this)->after();}protected:void before(){}void after(){}};struct Concrete:public Base<Concrete>{void before(){std::puts("before");}void after(){std::puts("after");}void work(){std::puts("work");}};',
    '#[proc_macro_derive(Builder,attributes(builder))]pub fn derive_builder(input:TokenStream)->TokenStream{let ast=parse_macro_input!(input as DeriveInput);let name=&ast.ident;let bname=format_ident!("{}Builder",name);let fields=if let Data::Struct(DataStruct{fields:Fields::Named(f),..})=&ast.data{&f.named}else{panic!("Builder only for named structs")};let setters=fields.iter().map(|f|{let id=&f.ident;let ti=&f.ty;quote!{pub fn #id(&mut self,v:#ti)->&mut Self{self.#id=Some(v);self}}});quote!{struct #bname{};impl #bname{#(#setters)*}}.into()}',
  ];

  const CODE_STR_COUNT = CODE_STRINGS.length;

  function randInRange(mean, spread) {
    return mean + (Math.random() - 0.5) * 2 * spread;
  }

  // ── gruvbox syntax palette ────────────────────────────────────────────────
  //  0  DEFAULT   #ebdbb2  cream    identifiers / misc
  //  1  KEYWORD   #fb4934  red      fn if for return class …
  //  2  TYPE      #fabd2f  yellow   PascalCase types & struct names
  //  3  STRING    #b8bb26  green    string literals
  //  4  NUMBER    #d3869b  purple   numeric literals
  //  5  OPERATOR  #83a598  teal     = + - < > & | …
  //  6  FUNC      #8ec07c  aqua     function / method names
  //  7  PUNCT     #a89984  gray     { } ( ) [ ] ; ,

  const T_DEFAULT  = 0;
  const T_KEYWORD  = 1;
  const T_TYPE     = 2;
  const T_STRING   = 3;
  const T_NUMBER   = 4;
  const T_OPERATOR = 5;
  const T_FUNC     = 6;
  const T_PUNCT    = 7;

  const SYN_RGB = [
    [235, 219, 178],
    [251,  73,  52],
    [250, 189,  47],
    [184, 187,  38],
    [211, 134, 155],
    [131, 165, 152],
    [142, 192, 124],
    [168, 153, 132],
  ];

  const SYN_HEX = [
    '#ebdbb2', '#fb4934', '#fabd2f', '#b8bb26',
    '#d3869b', '#83a598', '#8ec07c', '#a89984',
  ];

  const ALPHA_STEPS = 64;

  // SYN_TAIL[tokenType][alphaStep] — precomputed rgba strings for fast path
  const SYN_TAIL = SYN_RGB.map(([r, g, b]) =>
    Array.from({ length: ALPHA_STEPS }, (_, i) => {
      const a = Math.pow(1 - i / ALPHA_STEPS, CONFIG.tailPow).toFixed(3);
      return `rgba(${r},${g},${b},${a})`;
    })
  );

  // ── tokenizer (runs once per code string at startup) ─────────────────────

  const KEYWORDS = new Set([
    'abstract','append','as','async','auto','await','bool','box','break',
    'cap','case','catch','chan','class','close','const','constexpr','continue',
    'copy','crate','decltype','default','defer','delete','do','double','dyn',
    'else','enum','export','extends','extern','false','finally','float',
    'fn','for','from','func','function','get','go','if','impl','import',
    'in','inline','instanceof','int','interface','len','let','long','make',
    'match','mod','module','move','mut','namespace','new','nil','null','nullptr',
    'of','package','panic','pub','range','recover','ref','return','select',
    'self','set','short','signed','size_t','static','struct','super','switch',
    'template','this','throw','trait','true','try','type','typeof','typename',
    'undefined','unsafe','unsigned','use','using','var','virtual','void',
    'volatile','where','while',
  ]);

  // sorted longest-first so regex alternation prefers longer matches
  const KW_RE = new RegExp(
    '(?:' + [...KEYWORDS].sort((a, b) => b.length - a.length).join('|') + ')', 'g'
  );

  function buildTokenMap(code) {
    const len = code.length;
    const map = new Uint8Array(len); // default = T_DEFAULT = 0

    // 1. punctuation
    for (let i = 0; i < len; i++) {
      const c = code[i];
      if (c==='{' || c==='}' || c==='(' || c===')' || c==='[' || c===']' || c===';' || c===',')
        map[i] = T_PUNCT;
    }

    // 2. operators
    for (let i = 0; i < len; i++) {
      const c = code[i];
      if (c==='=' || c==='+' || c==='-' || c==='*' || c==='/' || c==='<' || c==='>' ||
          c==='!' || c==='&' || c==='|' || c==='?' || c==='^' || c==='~' || c==='%' ||
          c===':' || c==='@' || c==='.' || c==='#')
        map[i] = T_OPERATOR;
    }

    // 3. numbers (digits; 0x hex, floats)
    {
      let inNum = false;
      for (let i = 0; i < len; i++) {
        const c = code[i];
        const isDigit = c >= '0' && c <= '9';
        if (isDigit || (inNum && (c==='.' || c==='x' || c==='b' || c==='u' || c==='f' || c==='e'))) {
          map[i] = T_NUMBER; inNum = true;
        } else inNum = false;
      }
    }

    // 4. string literals  "…" '…' `…`
    function markStrings(q) {
      for (let i = 0; i < len; ) {
        if (code[i] === q) {
          const s = i++;
          while (i < len && code[i] !== q) { if (code[i] === '\\') i++; i++; }
          if (i < len) i++;
          for (let k = s; k < i; k++) map[k] = T_STRING;
        } else i++;
      }
    }
    markStrings('"'); markStrings("'"); markStrings('`');

    // 5. function / method names: lowercase-starting identifier immediately before (
    for (let i = 1; i < len; i++) {
      if (code[i] === '(') {
        let j = i - 1;
        while (j >= 0) {
          const d = code[j];
          if ((d>='a'&&d<='z')||(d>='A'&&d<='Z')||(d>='0'&&d<='9')||d==='_') j--; else break;
        }
        j++;
        if (j < i && code[j] >= 'a' && code[j] <= 'z')
          for (let k = j; k < i; k++) map[k] = T_FUNC;
      }
    }

    // 6. types: PascalCase [A-Z][a-zA-Z0-9_]+
    for (let i = 0; i < len; ) {
      const c = code[i];
      if (c >= 'A' && c <= 'Z') {
        let j = i + 1;
        while (j < len) {
          const d = code[j];
          if ((d>='a'&&d<='z')||(d>='A'&&d<='Z')||(d>='0'&&d<='9')||d==='_') j++; else break;
        }
        let safe = true;
        for (let k = i; k < j; k++) if (map[k] === T_STRING || map[k] === T_NUMBER) { safe = false; break; }
        if (safe) for (let k = i; k < j; k++) map[k] = T_TYPE;
        i = j;
      } else i++;
    }

    // 7. keywords — highest priority, overwrites everything above
    KW_RE.lastIndex = 0;
    let m;
    while ((m = KW_RE.exec(code)) !== null) {
      const start = m.index, end = start + m[0].length;
      const before = start > 0       ? code[start - 1] : null;
      const after  = end   < len     ? code[end]        : null;
      // not preceded by alphanumeric (not inside an identifier)
      const okBefore = !before || !/[a-zA-Z0-9_]/.test(before);
      // not followed by lowercase (avoids "in" inside "interface", etc.)
      const okAfter  = !after  || !/[a-z_]/.test(after);
      if (okBefore && okAfter)
        for (let k = start; k < end; k++) map[k] = T_KEYWORD;
    }

    return map;
  }

  const CODE_TOKEN_MAPS = CODE_STRINGS.map(buildTokenMap);

  // ── font cache ────────────────────────────────────────────────────────────

  const fontCache = {};
  function getFont(px) { return fontCache[px] || (fontCache[px] = px + 'px monospace'); }

  // ── stream factory ────────────────────────────────────────────────────────
  //   s.y            — world-space fixed y, perspective-projected to screenY
  //   s.x            — screen-space column index, advances rightward
  //   s.chars        — circular char buffer
  //   s.tokenCircle  — parallel Uint8Array of token types (mirrors chars)

  function spawnStream(zOverride) {
    const { focal, zFar, zNear, baseFont, charAspect,
            speedMean, speedSpread, tailMean, tailSpread } = CONFIG;
    const r = Math.random(), c = 0.28;
    const u = r < c ? Math.sqrt(r * c) : 1 - Math.sqrt((1 - r) * (1 - c));
    const z = zOverride ?? (zNear + (zFar - zNear) * u);

    const halfWorld = (canvas.height / 2) * z / focal;
    const gridCount = Math.max(1, Math.floor(2 * halfWorld / baseFont));
    const y         = (Math.floor(Math.random() * gridCount) - gridCount / 2) * baseFont;

    const tailLen    = Math.max(2, Math.round(randInRange(tailMean, tailSpread)));
    const speed      = Math.max(1, randInRange(speedMean, speedSpread));
    const fontSize   = Math.max(4, Math.round(baseFont * focal / z));
    const cols       = Math.ceil(canvas.width / (fontSize * charAspect));

    const codeStrIdx = Math.random() * CODE_STR_COUNT | 0;
    const codeStr    = CODE_STRINGS[codeStrIdx];
    const tokenMap   = CODE_TOKEN_MAPS[codeStrIdx];
    const slen       = codeStr.length;
    const codeOff    = Math.random() * slen | 0;

    const tc = new Uint8Array(tailLen);
    for (let t = 0; t < tailLen; t++) tc[t] = tokenMap[(codeOff + t) % slen];

    return {
      y, z,
      x:           Math.random() * cols | 0,
      tailLen,
      step:        (1000 / speedMean) * z / focal,
      acc:         0,
      chars:       Array.from({ length: tailLen }, (_, t) => codeStr[(codeOff + t) % slen]),
      head:        0,
      codeStr,
      tokenMap,
      codePos:     (codeOff + tailLen) % slen,
      tokenCircle: tc,
      speed,
      invSpeed:    1000 / speed,
      glow:        0,
      dying:       false,
      fadeAlpha:   1,
      tailAlphas:  Array.from({ length: tailLen }, (_, t) =>
        t === 0 ? 1 : Math.pow(1 - t / tailLen, CONFIG.tailPow)
      ),
      tailIdx:     Array.from({ length: tailLen }, (_, t) =>
        Math.floor(t / tailLen * ALPHA_STEPS)
      ),
    };
  }

  // ── state ─────────────────────────────────────────────────────────────────

  let streams      = [];
  let animId       = null;
  let lastTime     = 0;
  let cachedTarget = 0;
  let pulses       = [];
  let nextPulseAt  = 0;
  const waveZs     = [];

  function calcTarget() {
    const { baseFont, density } = CONFIG;
    return Math.min(6000, Math.round(Math.floor(canvas.height / baseFont) * density * 18));
  }

  function init() {
    cachedTarget = calcTarget();
    streams = [];
    for (let i = 0; i < cachedTarget; i++) {
      const ri = Math.random(), ci = 0.28;
      const u = ri < ci ? Math.sqrt(ri * ci) : 1 - Math.sqrt((1 - ri) * (1 - ci));
      streams.push(spawnStream(CONFIG.zNear + (CONFIG.zFar - CONFIG.zNear) * u));
    }
  }

  // ── draw loop ─────────────────────────────────────────────────────────────

  function draw(now) {
    const delta = Math.min(now - lastTime, 100);
    lastTime = now;

    const { focal, zNear, zFar, flySpeed, baseFont, charAspect,
            bpm, pulseDuration, pulseWidth, pulseStrength,
            deathRate, deathFadeMs, glowDecayMs } = CONFIG;

    const cw        = canvas.width;
    const ch        = canvas.height;
    const chHalf    = ch * 0.5;
    const flyStep   = flySpeed * delta * 0.001;
    const deathProb = deathRate * delta * 0.001;
    const fadeStep  = delta / deathFadeMs;
    const invFocal  = 1 / focal;
    const invPulseW = 1 / pulseWidth;

    ctx.clearRect(0, 0, cw, ch);

    // pulses
    const beatMs = 60000 / bpm;
    if (now >= nextPulseAt) {
      pulses.push({ startTime: now });
      nextPulseAt = nextPulseAt === 0 ? now + beatMs : nextPulseAt + beatMs;
    }
    for (let i = pulses.length - 1; i >= 0; i--) {
      if (now - pulses[i].startTime > pulseDuration) {
        pulses[i] = pulses[pulses.length - 1]; pulses.pop();
      }
    }
    waveZs.length = 0;
    const zSpan = zFar - zNear;
    for (let i = 0; i < pulses.length; i++)
      waveZs.push(zFar - zSpan * (now - pulses[i].startTime) / pulseDuration);
    const waveCount = waveZs.length;
    const glowDecay = Math.exp(-delta / glowDecayMs);

    // update + cull
    let len = streams.length;
    for (let i = len - 1; i >= 0; i--) {
      const s = streams[i];
      s.z -= flyStep;
      if (s.z < zNear) { streams[i] = streams[--len]; streams.length = len; continue; }

      if (s.dying) {
        s.fadeAlpha -= fadeStep;
        if (s.fadeAlpha <= 0) { streams[i] = streams[--len]; streams.length = len; continue; }
      } else {
        s.step = s.invSpeed * s.z * invFocal;
        s.acc += delta;
        if (s.acc >= s.step) {
          s.acc -= s.step;
          s.x++;
          const newHead = s.head === 0 ? s.tailLen - 1 : s.head - 1;
          s.head = newHead;
          s.chars[newHead]       = s.codeStr[s.codePos];
          s.tokenCircle[newHead] = s.tokenMap[s.codePos];
          s.codePos = (s.codePos + 1) % s.codeStr.length;
        }
        if (Math.random() < deathProb) s.dying = true;
      }

      s.glow *= glowDecay;
      for (let p = 0; p < waveCount; p++) {
        const d   = s.z - waveZs[p];
        const hit = (1 - (d < 0 ? -d : d) * invPulseW) * pulseStrength;
        if (hit > s.glow) s.glow = hit;
      }
    }

    while (streams.length < cachedTarget) streams.push(spawnStream());

    // render
    let lastFont = '';
    const streamCount = streams.length;
    for (let si = 0; si < streamCount; si++) {
      const s     = streams[si];
      const scale = focal / s.z;
      const fontF = Math.max(4, baseFont * scale);
      if (fontF < 3) continue;

      const screenY = chHalf + s.y * scale;
      if (screenY < -fontF || screenY > ch + fontF) continue;

      const fontPx   = (fontF + 0.5) | 0;
      const charStep = fontF * charAspect;
      const cols     = Math.ceil(cw / charStep);
      const tailLen  = s.tailLen;
      const drawLen  = fontF < 7 ? Math.min(tailLen, Math.max(5, fontF * 2 | 0)) : tailLen;

      const boost = s.glow;
      const chars = s.chars;
      const head  = s.head;
      const sx    = s.x;
      const tc    = s.tokenCircle;

      const fontStr = getFont(fontPx);
      if (fontStr !== lastFont) { ctx.font = fontStr; lastFont = fontStr; }

      if (boost > 0.01) {
        // pulse path: boost each token color, use globalAlpha for tail fade
        const f = 1 + boost * 1.5;
        const boosted = new Array(8);
        for (let tok = 0; tok < 8; tok++) {
          const [r, g, b] = SYN_RGB[tok];
          boosted[tok] = `rgb(${r*f<255?r*f|0:255},${g*f<255?g*f|0:255},${b*f<255?b*f|0:255})`;
        }
        const tailAlphas = s.tailAlphas;
        const fadeA      = s.fadeAlpha;
        for (let t = 0; t < drawLen; t++) {
          const col = sx - t;
          if (col < 0 || col > cols) continue;
          let idx = head + t; if (idx >= tailLen) idx -= tailLen;
          ctx.globalAlpha = tailAlphas[t] * fadeA;
          ctx.fillStyle   = boosted[tc[idx]];
          ctx.fillText(chars[idx], col * charStep, screenY);
        }
        ctx.globalAlpha = 1;
      } else {
        // fast path: precomputed SYN_TAIL rgba, no globalAlpha overhead (except fade-out)
        const fading  = s.fadeAlpha < 0.999;
        const tailIdx = s.tailIdx;
        if (fading) ctx.globalAlpha = s.fadeAlpha;
        for (let t = 0; t < drawLen; t++) {
          const col = sx - t;
          if (col < 0 || col > cols) continue;
          let idx = head + t; if (idx >= tailLen) idx -= tailLen;
          ctx.fillStyle = t === 0
            ? SYN_HEX[tc[idx]]
            : SYN_TAIL[tc[idx]][tailIdx[t]];
          ctx.fillText(chars[idx], col * charStep, screenY);
        }
        if (fading) ctx.globalAlpha = 1;
      }
    }

    animId = requestAnimationFrame(draw);
  }

  // ── start / resize ────────────────────────────────────────────────────────

  function start() {
    if (animId !== null) { cancelAnimationFrame(animId); animId = null; }
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    lastTime    = 0;
    pulses      = [];
    nextPulseAt = 0;
    init();
    animId = requestAnimationFrame(draw);
  }

  window.addEventListener('resize', start);
  start();
</script>
</body>
</html>
